name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download memu-py wheel from memU repo
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repo: parasite2060/memU
          workflow: build-wheel.yml
          branch: main
          name: memu-wheel
          path: memu-wheel/
          if_no_artifact_found: warn

      - name: Locate wheel file
        id: wheel
        run: |
          WHEEL=$(ls memu-wheel/*.whl 2>/dev/null | head -1 || true)
          if [ -n "$WHEEL" ]; then
            echo "path=$WHEEL" >> "$GITHUB_OUTPUT"
            echo "Found wheel: $WHEEL"
          else
            echo "path=" >> "$GITHUB_OUTPUT"
            echo "No wheel found — will use PyPI version"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/parasite2060/memu-server
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern=v{{version}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfiles/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MEMU_WHEEL=${{ steps.wheel.outputs.path }}
