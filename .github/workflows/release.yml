name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Pre-release identifier (e.g., alpha.1, beta.2, rc.1). Leave empty for dry run."
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

  manual-release:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease != ''
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v6
      - name: Compute pre-release version
        id: version
        run: |
          BASE_VERSION=$(grep 'version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          PRERELEASE="${{ github.event.inputs.prerelease }}"
          VERSION="${BASE_VERSION}-${PRERELEASE}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=v${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Create pre-release tag and GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag_name }}"
          VERSION="${{ steps.version.outputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" --title "v${VERSION}" --notes "Pre-release v${VERSION}" --prerelease

  docker-publish:
    needs: [release-please, manual-release]
    if: |
      always() && (
        needs.release-please.outputs.release_created == 'true' ||
        (needs.manual-release.result == 'success' && needs.manual-release.outputs.version != '')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Resolve version
        id: resolve
        run: |
          VERSION="${{ needs.release-please.outputs.version || needs.manual-release.outputs.version }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download memu-py wheel from memU repo
        uses: dawidd6/action-download-artifact@v20
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repo: parasite2060/memU
          workflow: build-wheel.yml
          branch: main
          name: memu-wheel
          path: memu-wheel/
          if_no_artifact_found: warn

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/parasite2060/memu-server
          tags: |
            type=semver,pattern={{version}},value=${{ steps.resolve.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.resolve.outputs.version }}
            type=raw,value=latest,enable=${{ steps.resolve.outputs.is_prerelease == 'false' }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: dockerfiles/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
